name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Lint Python correctness
        run: python -m ruff check src tests scripts run_tests_with_path.py
      - name: Lint static path boundary maintainability
        run: python -m ruff check --select I,UP,B src/mfblue/static_paths.py tests/test_server_static_paths.py
      - name: Typecheck static path boundary
        run: python -m mypy src/mfblue/static_paths.py
      - name: Run Python tests
        run: |
          python -m coverage erase
          python -m coverage run run_tests_with_path.py
      - name: Enforce repository coverage floor
        run: python -m coverage report
      - name: Enforce static path boundary coverage
        env:
          PYTHONPATH: src
        run: |
          python -m coverage erase
          python -m coverage run --branch --source=mfblue.static_paths -m unittest discover -s tests -p "test_server_static_paths.py"
          python -m coverage report --fail-under=100
      - name: Check frontend JavaScript syntax
        shell: pwsh
        run: |
          $files = @(
            "frontend/app-core.js",
            "frontend/app-assets.js",
            "frontend/app-budget.js",
            "frontend/app-analysis.js",
            "frontend/app-bootstrap.js",
            "frontend/readonly_app.js"
          )

          foreach ($file in $files) {
            node --check $file
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
      - name: Build synthetic public demo
        run: python scripts/build_public_demo.py --output _site/index.html
      - name: Verify public demo artifact
        shell: pwsh
        run: |
          if (-not (Test-Path "_site/index.html")) {
            throw "_site/index.html was not generated"
          }
          if (-not (Select-String -Path "_site/index.html" -Pattern "合成データの公開デモ" -Quiet)) {
            throw "Synthetic-data marker was not found"
          }
