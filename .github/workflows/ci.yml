name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Run Python tests
        run: python run_tests_with_path.py
      - name: Check frontend JavaScript syntax
        shell: pwsh
        run: |
          $files = @(
            "frontend/app-core.js",
            "frontend/app-assets.js",
            "frontend/app-budget.js",
            "frontend/app-analysis.js",
            "frontend/app-bootstrap.js",
            "frontend/readonly_app.js"
          )

          foreach ($file in $files) {
            node --check $file
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
